
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IsYourBaby10??!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #050505;
      color: #f8f8f8;
      overflow-x: hidden;
    }
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
    .bg-mesh {
      background-color: #050505;
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,50%,35%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,60%,40%,1) 0, transparent 50%), 
        radial-gradient(at 0% 100%, hsla(27,100%,25%,1) 0, transparent 50%), 
        radial-gradient(at 100% 100%, hsla(263,100%,30%,1) 0, transparent 50%);
      background-attachment: fixed;
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }
    .iridescent-text {
      background: linear-gradient(to right, #60efff, #ff5e98, #ffbe0b, #60efff);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(96, 239, 255, 0.4));
      animation: iridescent-move 6s linear infinite;
    }
    @keyframes iridescent-move {
      to { background-position: 300% center; }
    }
    .aura-glow-cyan {
      box-shadow: 0 0 60px rgba(96, 239, 255, 0.25);
    }
    .aura-glow-pink {
      box-shadow: 0 0 60px rgba(255, 94, 152, 0.25);
    }
    .aura-glow-gold {
      box-shadow: 0 0 60px rgba(255, 190, 11, 0.25);
    }
    @keyframes rotate-gradient {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    .animate-iridescent {
      animation: rotate-gradient 12s linear infinite;
    }
    @keyframes score-reveal {
      0% { transform: scale(0.6) translateY(20px); opacity: 0; filter: blur(30px); }
      70% { transform: scale(1.1) translateY(-5px); opacity: 1; filter: blur(0px); }
      100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); }
    }
    .animate-score-reveal {
      animation: score-reveal 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .mirror-mode {
      transform: scaleX(-1);
    }
    .btn-iridescent {
      background: linear-gradient(135deg, #60efff, #ff5e98, #ffbe0b);
      background-size: 200% auto;
      position: relative;
      z-index: 1;
      overflow: hidden;
      animation: iridescent-move 4s linear infinite;
    }
    .btn-iridescent::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: rotate(45deg);
      transition: 0.6s;
    }
    .btn-iridescent:hover::after {
      left: 100%;
    }
    @keyframes progress-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer-bar {
      background: linear-gradient(to right, rgba(96, 239, 255, 0.2) 0%, rgba(255, 94, 152, 0.8) 50%, rgba(96, 239, 255, 0.2) 100%);
      background-size: 200% 100%;
      animation: progress-shimmer 2s infinite linear;
    }
  </style>

</head>
